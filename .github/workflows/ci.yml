name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Ruff, mypy, unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: mypy
        run: mypy .

      - name: Unit tests
        run: pytest -m unit
