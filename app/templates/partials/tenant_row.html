<div id="tenant-{{ tenant.id }}" class="flex items-center justify-between px-6 py-4 border-b border-gray-800 last:border-0">
  <a href="/ui/tenants/{{ tenant.id }}/chat" class="flex items-center gap-3 flex-1 hover:opacity-80 transition-opacity min-w-0">
    <div class="min-w-0">
      <div class="font-medium text-gray-100">{{ tenant.name or "Unnamed tenant" }}</div>
      <div class="text-sm text-gray-500 font-mono truncate">{{ tenant.id }}</div>
    </div>
  </a>
  <div class="flex items-center gap-3 ml-4 shrink-0">
    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <button
      hx-delete="/ui/tenants/{{ tenant.id }}"
      hx-target="#tenant-{{ tenant.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete tenant '{{ tenant.name }}'? This cannot be undone."
      class="text-gray-600 hover:text-red-400 transition-colors p-1 rounded"
      title="Delete tenant">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </button>
  </div>
</div>
